name: Scrape Immobilier

on:
  schedule:
    - cron: '0 */1 * * *'   # Toutes les heures
  workflow_dispatch:          # Lancement manuel possible

permissions:
  contents: write             # Pour committer seen.json + docs/

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          FREE_SMS_USER: ${{ secrets.FREE_SMS_USER }}
          FREE_SMS_PASS: ${{ secrets.FREE_SMS_PASS }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python -m scraper.main

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen.json docs/index.html
          git diff --staged --quiet || git commit -m "🏠 Update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
